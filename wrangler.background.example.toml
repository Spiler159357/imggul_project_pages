name = "imggul-background-worker"
main = "src/planner-background.js"
compatibility_date = "2024-09-23"

# Fill these values after creating the resources in Cloudflare.
[[d1_databases]]
binding = "DB"
database_name = "imggul-planner"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

[[r2_buckets]]
binding = "imgBucket"
bucket_name = "imggul-storage"

[[queues.consumers]]
queue = "imggul-generation-queue"
max_batch_size = 1
max_batch_timeout = 30
max_retries = 2
dead_letter_queue = "imggul-generation-dlq"

[[queues.producers]]
binding = "GENERATION_QUEUE"
queue = "imggul-generation-queue"
