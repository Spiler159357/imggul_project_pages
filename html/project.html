<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프로젝트 탭 레이아웃</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- 고정된 CSS 파일 연결 -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="h-screen flex flex-col overflow-hidden text-gray-800 bg-white">
    <header class="flex items-end justify-between px-6 pt-4 border-b border-gray-300">
        <div class="mb-3">
            <strong class="text-2xl font-extrabold text-gray-900">ImgGul</strong>
        </div>
        <nav class="flex space-x-2 -mb-[1px]">
            <span class="px-5 py-2.5 cursor-pointer tab-inactive">탐색기</span>
            <span class="px-5 py-2.5 cursor-pointer tab-inactive">이미지 생성</span>
            <span class="px-5 py-2.5 cursor-pointer tab-active">프로젝트</span>
        </nav>
        <div class="mb-3">
            <span class="cursor-pointer text-sm font-medium">로그아웃</span>
        </div>
    </header>
    
    <main class="flex-1 flex flex-col p-6 overflow-hidden">
        <section class="flex items-center justify-between mb-6 shrink-0">
            <div class="flex items-center space-x-3">
                <button class="text-2xl font-bold focus:outline-none" aria-label="뒤로 가기">&#8592;</button>
                <h1 class="text-2xl font-bold">프로젝트 이름</h1>
            </div>
            <div>
                <button class="text-2xl font-bold px-2 focus:outline-none" aria-label="더보기 메뉴">&#8942;</button>
            </div>
        </section>

        <section class="flex-1 grid grid-cols-3 gap-6 min-h-0">
            <div class="flex flex-col border border-gray-300 rounded">
                <div class="px-4 py-2 border-b border-gray-300 font-bold">프롬프트</div>
                <div class="flex-1 p-4 overflow-y-auto"></div>
            </div>
            <div class="flex flex-col border border-gray-300 rounded">
                <div class="px-4 py-2 border-b border-gray-300 font-bold">이미지</div>
                <div class="flex-1 p-4 overflow-y-auto"></div>
            </div>
            <div class="flex flex-col border border-gray-300 rounded">
                <div class="px-4 py-2 border-b border-gray-300 font-bold">상황</div>
                <div class="flex-1 p-4 overflow-y-auto"></div>
            </div>
        </section>
    </main>
</body>
</html>
