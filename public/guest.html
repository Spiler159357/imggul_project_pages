<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImgGul Guest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>
</head>
<body class="h-[100dvh] overflow-hidden bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 font-['Noto_Sans_KR']">
    <div class="flex h-full min-h-0 flex-col">
        <header class="h-14 flex-shrink-0 border-b border-gray-200 bg-white px-3 sm:px-5 dark:border-gray-700 dark:bg-gray-800">
            <div class="mx-auto flex h-full max-w-7xl items-center justify-between gap-3">
                <div class="flex min-w-0 items-center gap-2.5">
                    <span class="flex h-8 w-8 flex-shrink-0 items-center justify-center rounded-lg bg-indigo-600 text-sm font-bold text-white">IG</span>
                    <div class="min-w-0">
                        <div class="flex items-baseline gap-2">
                            <span class="text-sm font-bold text-gray-900 dark:text-white">ImgGul</span>
                            <span class="text-[10px] font-medium text-gray-400">v{{APP_VERSION}}</span>
                        </div>
                        <p id="guest-project-name" class="truncate text-[11px] text-gray-500 dark:text-gray-400">프로젝트 불러오는 중</p>
                    </div>
                </div>
                <button id="guest-theme-toggle" type="button" class="rounded-full p-2 text-gray-500 transition hover:bg-gray-100 hover:text-indigo-600 dark:text-gray-400 dark:hover:bg-gray-700 dark:hover:text-indigo-300" aria-label="다크 모드 전환">
                    <i data-lucide="moon" class="h-5 w-5"></i>
                </button>
            </div>
        </header>

        <nav class="flex-shrink-0 border-b border-gray-200 bg-white px-3 dark:border-gray-700 dark:bg-gray-800" aria-label="게스트 메뉴">
            <div class="mx-auto grid h-12 max-w-md grid-cols-2 gap-2 p-1.5">
                <button id="guest-tab-characters" type="button" class="rounded-lg px-4 text-sm font-bold transition" aria-selected="true">
                    <span class="inline-flex items-center gap-1.5"><i data-lucide="users" class="h-4 w-4"></i>캐릭터</span>
                </button>
                <button id="guest-tab-posts" type="button" class="rounded-lg px-4 text-sm font-bold transition" aria-selected="false">
                    <span class="inline-flex items-center gap-1.5"><i data-lucide="newspaper" class="h-4 w-4"></i>게시글</span>
                </button>
            </div>
        </nav>

        <main id="guest-main" class="min-h-0 flex-1 overflow-y-auto p-3 sm:p-6" tabindex="-1">
            <div id="guest-content" class="mx-auto w-full max-w-6xl"></div>
        </main>
    </div>

    <div id="guest-image-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/80 p-2 backdrop-blur-sm sm:p-5" role="dialog" aria-modal="true" aria-labelledby="guest-image-title">
        <div class="flex max-h-[95dvh] w-full max-w-5xl flex-col overflow-hidden rounded-xl border border-gray-700 bg-gray-950 shadow-2xl">
            <div class="flex flex-shrink-0 items-center justify-between gap-3 border-b border-gray-700 px-4 py-3 text-white">
                <div class="min-w-0">
                    <h2 id="guest-image-title" class="truncate text-sm font-bold">이미지 미리보기</h2>
                    <p id="guest-image-path" class="truncate text-[11px] text-gray-400"></p>
                </div>
                <button id="guest-image-close" type="button" class="rounded-lg p-2 text-gray-300 transition hover:bg-gray-800 hover:text-white" aria-label="이미지 닫기">
                    <i data-lucide="x" class="h-5 w-5"></i>
                </button>
            </div>
            <div class="min-h-0 flex-1 overflow-auto p-2 text-center sm:p-4">
                <img id="guest-image-preview" alt="" class="mx-auto max-h-[80dvh] max-w-full object-contain">
            </div>
        </div>
    </div>

    <div id="guest-comment-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/60 p-4 backdrop-blur-sm" role="dialog" aria-modal="true" aria-labelledby="guest-comment-modal-title">
        <div class="w-full max-w-md overflow-hidden rounded-xl border border-gray-200 bg-white shadow-2xl dark:border-gray-700 dark:bg-gray-800">
            <div class="flex items-center justify-between border-b border-gray-200 px-4 py-3 dark:border-gray-700">
                <h2 id="guest-comment-modal-title" class="text-sm font-bold">댓글 수정</h2>
                <button id="guest-comment-modal-close" type="button" class="rounded-lg p-1.5 text-gray-500 hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-gray-700" aria-label="닫기">
                    <i data-lucide="x" class="h-5 w-5"></i>
                </button>
            </div>
            <form id="guest-comment-action-form" class="space-y-4 p-4">
                <div id="guest-comment-edit-fields" class="space-y-4">
                    <div>
                        <label for="guest-comment-edit-name" class="mb-1 block text-xs font-bold text-gray-600 dark:text-gray-300">이름</label>
                        <input id="guest-comment-edit-name" type="text" maxlength="30" class="w-full rounded-lg border border-gray-300 bg-white p-2.5 text-sm dark:border-gray-600 dark:bg-gray-700" required>
                    </div>
                    <div>
                        <label for="guest-comment-edit-body" class="mb-1 block text-xs font-bold text-gray-600 dark:text-gray-300">내용</label>
                        <textarea id="guest-comment-edit-body" maxlength="2000" rows="5" class="w-full resize-y rounded-lg border border-gray-300 bg-white p-2.5 text-sm dark:border-gray-600 dark:bg-gray-700" required></textarea>
                    </div>
                </div>
                <div>
                    <label for="guest-comment-action-password" class="mb-1 block text-xs font-bold text-gray-600 dark:text-gray-300">댓글 비밀번호</label>
                    <input id="guest-comment-action-password" type="password" minlength="8" maxlength="72" autocomplete="current-password" class="w-full rounded-lg border border-gray-300 bg-white p-2.5 text-sm dark:border-gray-600 dark:bg-gray-700" required>
                </div>
                <p id="guest-comment-action-error" class="hidden text-xs text-red-500" role="alert"></p>
                <div class="flex justify-end gap-2">
                    <button id="guest-comment-action-cancel" type="button" class="rounded-lg border border-gray-200 px-4 py-2 text-sm font-bold text-gray-600 dark:border-gray-700 dark:text-gray-300">취소</button>
                    <button id="guest-comment-action-submit" type="submit" class="rounded-lg bg-indigo-600 px-4 py-2 text-sm font-bold text-white hover:bg-indigo-700">저장</button>
                </div>
            </form>
        </div>
    </div>

    <script>window.GUEST_PROJECT_PATH = {{INITIAL_PROJECT_PATH_JSON}};</script>
    <script type="module" src="/js/guest.js?v=guest-page-20260721a"></script>
</body>
</html>
