<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImgGul Guest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gray: { 800: '#171717', 900: '#0a0a0a' }
                    }
                }
            }
        }
    </script>
    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden text-gray-800 bg-white dark:bg-gray-900 dark:text-gray-100 transition-colors duration-200">

    <header class="flex items-center justify-between h-14 px-4 sm:px-6 border-b border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 flex-shrink-0 z-50">
        <div class="flex items-center">
            <button onclick="window.toggleSidebar()" class="mr-2 sm:mr-3 p-1.5 rounded-md hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-500 dark:text-gray-400 transition">
                <i data-lucide="menu" class="w-5 h-5 sm:w-6 sm:h-6"></i>
            </button>
            <div class="flex items-center hover:opacity-80 transition cursor-default">
                <i data-lucide="image" class="h-5 w-5 sm:h-6 sm:w-6 text-indigo-600 dark:text-indigo-400 mr-1 sm:mr-2"></i>
                <span class="font-bold text-lg sm:text-xl text-gray-900 dark:text-white mr-1.5">ImgGul</span>
                <span class="font-mono text-[10px] sm:text-xs font-semibold text-gray-500 dark:text-gray-400 bg-gray-100 dark:bg-gray-700/80 border border-gray-200 dark:border-gray-600 px-1.5 py-0.5 rounded whitespace-nowrap">{{APP_VERSION}}</span>
            </div>
        </div>
        <div class="flex items-center space-x-2 sm:space-x-4">
             <button id="theme-toggle-btn" onclick="window.toggleDarkMode()" class="p-1.5 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 transition">
                <i data-lucide="sun" class="w-4 h-4 sm:w-5 sm:h-5 text-gray-600 dark:text-gray-400"></i>
             </button>
             <!-- [요청 반영] 게스트 화면에서 관리자 로그인 버튼 아예 제거됨 -->
        </div>
    </header>

    <div id="guest-empty" class="hidden flex-col items-center justify-center flex-1 w-full bg-white dark:bg-gray-900 z-10 absolute inset-0 pt-14">
        <i data-lucide="folder-lock" class="w-16 h-16 sm:w-20 sm:h-20 text-gray-300 dark:text-gray-700 mb-4"></i>
        <h2 class="text-lg sm:text-xl font-bold text-gray-700 dark:text-gray-200 mb-2">공유된 프로젝트가 없습니다</h2>
        <p class="text-sm text-gray-500 dark:text-gray-400 text-center px-4">현재 경로에 공개된 파일이 없거나 존재하지 않는 경로입니다.</p>
    </div>

    <!-- [추가] 잘못된 접근을 알리는 UI 블록 -->
    <div id="guest-invalid" class="hidden flex-col items-center justify-center flex-1 w-full bg-white dark:bg-gray-900 z-10 absolute inset-0 pt-14">
        <i data-lucide="shield-alert" class="w-16 h-16 sm:w-20 sm:h-20 text-red-400 dark:text-red-500 mb-4"></i>
        <h2 class="text-lg sm:text-xl font-bold text-gray-700 dark:text-gray-200 mb-2">잘못된 접근입니다</h2>
        <p class="text-sm text-gray-500 dark:text-gray-400 text-center px-4">올바른 프로젝트 경로(URL)를 통해 접속해 주세요.</p>
    </div>

    <div class="flex flex-1 overflow-hidden relative">
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-30 hidden md:hidden transition-opacity duration-300 opacity-0" onclick="window.toggleSidebar(true)"></div>
        
        <aside id="sidebar" class="absolute md:relative z-40 w-72 h-full border-r border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800/95 flex flex-col flex-shrink-0 transform -translate-x-full md:translate-x-0 transition-all duration-300 shadow-xl md:shadow-none">
            <div id="sidebar-explorer-content" class="flex-1 flex flex-col overflow-hidden">
                <div class="p-2.5 bg-gray-100 dark:bg-gray-800/80 font-bold text-xs border-b border-gray-200 dark:border-gray-700 flex-shrink-0 text-gray-500 dark:text-gray-400 uppercase tracking-wider">
                    폴더 및 파일
                </div>
                <ul id="sidebar-folder-list" class="flex-1 overflow-y-auto p-2 space-y-0.5"></ul>
            </div>
        </aside>

        <main class="flex-1 flex flex-col relative bg-white dark:bg-gray-900 overflow-hidden min-h-0 w-full">
            <div id="tab-explorer" class="flex flex-col flex-1 overflow-hidden w-full h-full">
                
                <!-- [요청 반영] 게스트 툴바: 모바일에서 무조건 가로(row) 배치 및 가운데 정렬되도록 UI 완전 개편 -->
                <div class="h-12 border-b border-gray-200 dark:border-gray-700 flex flex-row items-center justify-between px-3 sm:px-6 bg-white dark:bg-gray-800 flex-shrink-0 w-full overflow-hidden">
                    <div id="breadcrumbs" class="flex items-center text-sm text-gray-600 dark:text-gray-300 overflow-x-auto whitespace-nowrap scrollbar-hide flex-1 h-full mr-2"></div>
                    <div class="flex items-center flex-shrink-0 h-full">
                        <button onclick="window.refreshGallery()" class="text-gray-500 dark:text-gray-400 hover:text-indigo-600 dark:hover:text-indigo-400 p-1.5 rounded hover:bg-gray-100 dark:hover:bg-gray-700 transition" title="새로고침">
                            <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>

                <div id="gallery-content" class="flex-1 overflow-y-auto p-4 sm:p-6 bg-gray-50 dark:bg-gray-900/50 relative">
                    <div id="gallery-loading" class="hidden flex justify-center items-center h-40"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-600 dark:border-indigo-400"></div></div>
                    <div id="file-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3 sm:gap-4"></div>
                    <div id="gallery-empty" class="hidden flex flex-col items-center justify-center h-40 text-gray-400 dark:text-gray-500"><i data-lucide="folder-open" class="w-12 h-12 mb-2 opacity-50"></i><p>폴더가 비어있습니다.</p></div>
                    
                    <div class="h-24 w-full flex-shrink-0 pointer-events-none"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- [게스트용 모달] -->
    <div id="preview-modal" class="fixed inset-0 z-50 hidden bg-black bg-opacity-75 flex items-center justify-center p-2 sm:p-4 backdrop-blur-sm" onclick="window.closeModal(event)">
        <div class="relative bg-white dark:bg-gray-800 rounded-xl overflow-hidden max-w-4xl w-full h-[95vh] sm:max-h-[90vh] flex flex-col shadow-2xl transition-colors duration-200">
            <div class="flex justify-between items-center p-3 sm:p-4 border-b border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 flex-shrink-0">
                <div class="flex flex-col overflow-hidden mr-4">
                    <h3 id="modal-title" class="text-base sm:text-lg font-bold text-gray-900 dark:text-white truncate leading-tight">파일명</h3>
                    <p id="modal-key" class="text-[10px] sm:text-xs text-gray-500 dark:text-gray-400 truncate"></p>
                </div>
                <button id="close-btn" onclick="window.closeModal()" class="text-gray-500 hover:text-red-500 dark:text-gray-400 dark:hover:text-red-400 flex-shrink-0 p-1">
                    <i data-lucide="x" class="w-6 h-6 pointer-events-none"></i>
                </button>
            </div>
            
            <div id="modal-content-area" class="flex-grow bg-gray-100 dark:bg-gray-900 overflow-auto flex items-center justify-center p-2 sm:p-4">
                <img id="modal-img" src="" class="max-w-full max-h-full object-contain shadow-md rounded hidden bg-checkered">
                <textarea id="modal-text-editor" class="w-full h-full p-3 sm:p-4 border border-gray-300 dark:border-gray-600 rounded focus:ring-indigo-500 focus:border-indigo-500 font-mono text-xs sm:text-sm resize-none hidden bg-white dark:bg-gray-800 dark:text-white" readonly></textarea>
            </div>

            <div class="p-3 sm:p-4 bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 flex flex-col gap-3 flex-shrink-0">
                <div class="flex flex-col sm:flex-row w-full gap-2 sm:gap-0">
                    <input type="text" id="modal-url" class="flex-1 text-xs sm:text-sm text-gray-600 dark:text-gray-300 border border-gray-300 dark:border-gray-600 rounded sm:rounded-r-none px-3 py-2 bg-gray-50 dark:bg-gray-700 focus:outline-none font-mono" readonly>
                    <button id="modal-copy-btn" onclick="window.copyModalUrl()" class="w-full sm:w-auto bg-indigo-600 text-white px-4 py-2 rounded sm:rounded-l-none hover:bg-indigo-700 dark:bg-indigo-700 dark:hover:bg-indigo-600 text-sm font-medium whitespace-nowrap">
                        URL 복사
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.IS_ADMIN = false;
        window.INITIAL_PATH = "{{INITIAL_PATH}}";
        window.IS_EMPTY = {{IS_EMPTY}};
    </script>
    <script src="/script.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', async () => {
            const emptyNotice = document.getElementById('guest-empty');
            const invalidNotice = document.getElementById('guest-invalid');
            const gallery = document.getElementById('tab-explorer');
            const hamburgerBtn = document.querySelector('button[onclick="window.toggleSidebar()"]');
            
            if (!window.INITIAL_PATH || window.INITIAL_PATH === '') {
                // 루트 경로 접속 시 로그인으로 보내지 않고 '잘못된 접근' 출력 및 UI 차단
                if (invalidNotice) {
                    invalidNotice.classList.remove('hidden');
                    invalidNotice.classList.add('flex');
                }
                if (gallery) gallery.classList.add('hidden');
                if (hamburgerBtn) hamburgerBtn.classList.add('hidden');
            } else if (window.IS_EMPTY) {
                if (emptyNotice) {
                    emptyNotice.classList.remove('hidden');
                    emptyNotice.classList.add('flex');
                }
                if (gallery) gallery.classList.add('hidden');
                if (hamburgerBtn) hamburgerBtn.classList.add('hidden');
            } else {
                if (window.loadAliases) await window.loadAliases();
                
                const initPath = window.INITIAL_PATH || '';
                history.replaceState({ path: initPath }, '', '#' + initPath);
                window.loadPath(initPath, true);
            }
        });
    </script>
</body>
</html>
