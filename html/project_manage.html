<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프로젝트 관리 탭 레이아웃</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="h-screen flex flex-col overflow-hidden text-gray-800 bg-white">
    <header class="flex items-end justify-between px-6 pt-4 border-b border-gray-300">
        <div class="mb-3">
            <strong class="text-2xl font-extrabold text-gray-900">ImgGul</strong>
        </div>
        <nav class="flex space-x-2 -mb-[1px]">
            <span class="px-5 py-2.5 cursor-pointer tab-inactive">탐색기</span>
            <span class="px-5 py-2.5 cursor-pointer tab-inactive">이미지 생성</span>
            <span class="px-5 py-2.5 cursor-pointer tab-active">프로젝트</span>
        </nav>
        <div class="mb-3">
            <span class="cursor-pointer text-sm font-medium">로그아웃</span>
        </div>
    </header>

    <main class="flex-1 flex justify-center p-6 overflow-hidden">
        <section class="w-full max-w-2xl flex flex-col min-h-0">
            <div class="flex justify-between items-center mb-4 pr-6">
                <h2 class="font-bold text-lg flex-1 text-center pl-10">프로젝트 목록</h2>
                <button class="text-3xl font-bold focus:outline-none">+</button>
            </div>
            
            <div class="flex-1 overflow-y-auto flex flex-col gap-4 pr-2">
                <div class="border border-gray-300 rounded p-4 h-16 flex items-center">
                    <span class="font-bold">프로젝트 이름</span>
                </div>
                <div class="border border-gray-300 rounded p-4 h-16"></div>
                
                <div class="flex flex-col items-center space-y-4 mt-8 text-gray-400">
                    <span class="block w-1 h-1 bg-current rounded-full"></span>
                    <span class="block w-1 h-1 bg-current rounded-full"></span>
                    <span class="block w-1 h-1 bg-current rounded-full"></span>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
