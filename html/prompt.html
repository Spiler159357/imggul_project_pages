<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프롬프트 탭 레이아웃</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="h-screen flex flex-col overflow-hidden text-gray-800 bg-white">
    <header class="flex items-end justify-between px-6 pt-4 border-b border-gray-300">
        <div class="mb-3">
            <strong class="text-2xl font-extrabold text-gray-900">ImgGul</strong>
        </div>
        <nav class="flex space-x-2 -mb-[1px]">
            <span class="px-5 py-2.5 cursor-pointer tab-inactive">탐색기</span>
            <span class="px-5 py-2.5 cursor-pointer tab-inactive">이미지 생성</span>
            <span class="px-5 py-2.5 cursor-pointer tab-active">프로젝트</span>
        </nav>
        <div class="mb-3">
            <span class="cursor-pointer text-sm font-medium">로그아웃</span>
        </div>
    </header>

    <main class="flex-1 flex flex-col p-6 overflow-hidden">
        <section class="flex items-center mb-6 shrink-0">
            <div class="flex items-center space-x-3">
                <button class="text-2xl font-bold focus:outline-none" aria-label="뒤로 가기">&#8592;</button>
                <h1 class="text-2xl font-bold">프로젝트 이름</h1>
            </div>
        </section>

        <section class="flex-1 flex gap-6 min-h-0">
            <div class="w-3/5 flex flex-col border border-gray-300 rounded p-4">
                <h3 class="font-bold mb-4">입력 공간</h3>
                <textarea id="project-prompt-input" class="flex-1 resize-none outline-none auto-resize-textarea" placeholder="" aria-label="프롬프트 입력"></textarea>
            </div>
            
            <div class="w-2/5 flex flex-col gap-4">
                <div class="border border-gray-300 rounded p-4 text-center">
                    <span class="block text-sm font-bold text-gray-500">현재 글자 수</span>
                    <strong id="project-prompt-count" class="block mt-1 text-2xl font-extrabold text-gray-900">0자</strong>
                </div>
                <div class="border border-gray-300 rounded p-4 text-center">
                    <button class="font-bold">마크다운/요약</button>
                </div>
                <div class="border border-gray-300 rounded p-4 flex-1 flex flex-col">
                    <div>
                        <p class="font-bold">추가 기능을 위한 공간</p>
                        <p class="mt-2 text-sm">- 기능 추가 가능성 높음</p>
                    </div>
                    <div class="mt-auto pt-4 flex items-center justify-end gap-3">
                        <p id="project-prompt-save-status" class="min-h-4 text-xs text-gray-500"></p>
                        <button id="project-prompt-save-btn" type="button" class="px-4 py-2 rounded bg-indigo-600 text-white text-sm font-bold">저장</button>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script>
        const promptInput = document.getElementById('project-prompt-input');
        const promptCount = document.getElementById('project-prompt-count');
        const promptSaveButton = document.getElementById('project-prompt-save-btn');
        const promptSaveStatus = document.getElementById('project-prompt-save-status');

        function updatePromptCount() {
            promptCount.textContent = `${Array.from(promptInput.value).length.toLocaleString()}자`;
        }

        promptInput.addEventListener('input', updatePromptCount);
        promptSaveButton.addEventListener('click', () => {
            promptSaveStatus.textContent = 'prompt.md로 저장됩니다.';
        });
        updatePromptCount();
    </script>
</body>
</html>
